<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>🐦 Птица в деревне</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-color: #5a7a9a;
            touch-action: none;
        }
        
        #start-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(3px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; color: #e0e8f0; pointer-events: auto;
        }
        .menu-content {
            background: rgba(30,40,50,0.95); padding: 20px 25px; border-radius: 30px;
            max-width: 500px; width: 90%; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7); border: 1px solid #6a8aaa;
        }
        .menu-content h1 { color: #ffcc88; font-size: 30px; margin-bottom: 5px; }
        .menu-content h2 { color: #aaccdd; font-size: 14px; margin-bottom: 15px; }
        .control-selector { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .control-btn {
            background: #2a3a4a; color: #ccddee; border: 2px solid #4a6a8a;
            padding: 10px 15px; border-radius: 15px; cursor: pointer;
            font-size: 14px; font-weight: bold; flex: 1;
        }
        .control-btn.active { background: #4a8a6a; border-color: #8accaa; color: white; }
        .controls-grid {
            display: grid; grid-template-columns: auto 1fr; gap: 8px 12px;
            text-align: left; margin: 15px 0; background: rgba(0,0,0,0.3);
            padding: 12px; border-radius: 15px; font-size: 13px;
        }
        .key-badge {
            background: #2a4a6a; color: #ffd966; padding: 4px 10px;
            border-radius: 8px; font-weight: bold; border-bottom: 2px solid #1a3a5a;
        }
        .start-btn {
            background: #5a8a6a; color: white; border: none; padding: 14px 30px;
            font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer;
            margin-top: 10px; border-bottom: 5px solid #3a6a4a; width: 100%;
        }
        
        #game-ui { opacity: 1; pointer-events: none; }
        #ui-top {
            position: absolute; top: 10px; left: 10px;
            background: rgba(20,25,35,0.85); color: #ffcc88; padding: 6px 14px;
            border-radius: 30px; backdrop-filter: blur(4px); z-index: 100;
            border-left: 4px solid #aa8844; font-size: 14px;
        }
        #status-bar {
            position: absolute; top: 10px; right: 10px;
            background: rgba(20,25,35,0.85); color: #ccddee; padding: 6px 12px;
            border-radius: 30px; backdrop-filter: blur(4px); z-index: 100;
            font-size: 12px; display: flex; gap: 10px; border: 1px solid #4a6a8a;
        }
        .anger-bar { width: 60px; height: 6px; background: #2a3a4a; border-radius: 4px; overflow: hidden; }
        .anger-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #cc6644, #cc9933); }
        #cage-timer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30,20,20,0.9); color: #ffaa88; padding: 12px 25px;
            border-radius: 20px; font-size: 40px; font-weight: bold;
            border: 2px solid #aa5544; z-index: 300; display: none;
        }
        #cooldown-indicator {
            position: absolute; bottom: 180px; left: 10px;
            background: rgba(20,25,35,0.8); color: #aaccdd; padding: 5px 12px;
            border-radius: 20px; font-size: 12px;
        }
        
        #mobile-controls {
            position: absolute; bottom: 15px; left: 0; right: 0;
            display: none; justify-content: center; gap: 10px; padding: 5px;
            z-index: 200; pointer-events: none;
        }
        #mobile-controls.active { display: flex; flex-wrap: wrap; }
        .mobile-btn {
            background: rgba(30,40,55,0.9); color: #ffd966; border: 2px solid #5a7a9a;
            border-radius: 15px; padding: 12px 18px; font-size: 18px; font-weight: bold;
            pointer-events: auto; cursor: pointer; min-width: 60px; text-align: center;
            touch-action: manipulation;
        }
        .mobile-btn:active { background: rgba(60,80,100,0.9); transform: scale(0.95); }
        
        #camera-controls {
            position: absolute; left: 10px; bottom: 180px;
            display: none; gap: 8px; z-index: 200; pointer-events: none;
        }
        #camera-controls.active { display: flex; }
        .camera-btn {
            background: rgba(30,40,55,0.9); color: #88aacc; border: 2px solid #4a6a8a;
            border-radius: 15px; padding: 12px 18px; font-size: 20px; font-weight: bold;
            pointer-events: auto; cursor: pointer; text-align: center;
        }
        
        #height-controls {
            position: absolute; right: 10px; bottom: 180px;
            display: none; flex-direction: column; gap: 8px; z-index: 200; pointer-events: none;
        }
        #height-controls.active { display: flex; }
        .height-btn {
            background: rgba(30,40,55,0.9); color: #aaccdd; border: 2px solid #5a7a9a;
            border-radius: 15px; padding: 12px 18px; font-size: 18px; font-weight: bold;
            pointer-events: auto; cursor: pointer; text-align: center;
        }
        
        #message-popup {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            color: #ddccaa; background: rgba(25,20,15,0.85); padding: 6px 15px;
            border-radius: 25px; font-size: 14px; font-weight: bold;
            opacity: 0; transition: opacity 0.2s; z-index: 150;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            border-radius: 50%; background: rgba(220,220,240,0.7);
            transform: translate(-50%, -50%); z-index: 200;
        }
        #hunter-status {
            position: absolute; bottom: 100px; right: 10px;
            background: rgba(20,25,35,0.8); color: #ccaa88; padding: 5px 12px;
            border-radius: 20px; font-size: 11px;
        }
        #sound-toggle {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(20,25,35,0.8); color: #aaccdd; padding: 6px 12px;
            border-radius: 20px; font-size: 12px; cursor: pointer;
            pointer-events: auto; z-index: 400; border: 1px solid #5a7a9a;
        }
        
        @media (max-width: 400px) {
            .mobile-btn, .camera-btn, .height-btn { padding: 10px 14px; font-size: 16px; min-width: 50px; }
        }
    </style>
</head>
<body>
    <div id="start-menu">
        <div class="menu-content">
            <h1>🐦 Птица в деревне</h1>
            <h2>Выберите управление</h2>
            <div class="control-selector">
                <button class="control-btn active" data-control="pc">💻 ПК</button>
                <button class="control-btn" data-control="mobile">📱 Телефон</button>
            </div>
            <div class="controls-grid" id="pc-controls">
                <span class="key-badge">W</span><span>Вперёд</span>
                <span class="key-badge">Q/E</span><span>Поворот камеры</span>
                <span class="key-badge">ПРОБЕЛ</span><span>Вверх</span>
                <span class="key-badge">SHIFT</span><span>Вниз</span>
                <span class="key-badge">F</span><span>Помёт</span>
                <span class="key-badge">МЫШЬ</span><span>Обзор</span>
            </div>
            <div class="controls-grid" id="mobile-controls-info" style="display:none;">
                <span class="key-badge">↑</span><span>Вперёд</span>
                <span class="key-badge">◀ ▶</span><span>Поворот камеры</span>
                <span class="key-badge">⬆️⬇️</span><span>Высота</span>
                <span class="key-badge">💩</span><span>Помёт</span>
                <span class="key-badge">👆</span><span>Обзор (свайп)</span>
            </div>
            <button class="start-btn" id="start-game-btn">НАЧАТЬ ПОЛЁТ</button>
            <div style="color:#aaccdd; font-size:11px; margin-top:10px;">◀ ▶ вращают камеру, не птицу</div>
        </div>
    </div>

    <div id="game-ui">
        <div id="ui-top">🐦 Птица в деревне</div>
        <div id="status-bar">
            <span>🏹 <span id="hunter-count">2</span></span>
            <div style="display:flex; align-items:center; gap:4px;">
                <span>😠</span>
                <div class="anger-bar"><div id="anger-fill" class="anger-fill"></div></div>
                <span id="anger-value">0%</span>
            </div>
            <span id="cage-alert">✅</span>
        </div>
        <div id="cage-timer">10</div>
        <div id="cooldown-indicator"><span id="poop-cooldown-text">💩 Готов</span></div>
        <div id="hunter-status">🏹 Охотники: 🟢 Спокойны</div>
        <div id="sound-toggle" onclick="toggleSound()">🔊 Звук</div>
        
        <div id="mobile-controls">
            <button class="mobile-btn" data-action="forward">↑ Вперёд</button>
            <button class="mobile-btn" data-action="poop">💩 Помёт</button>
        </div>
        
        <div id="camera-controls">
            <button class="camera-btn" data-action="cam-left">◀ Камера</button>
            <button class="camera-btn" data-action="cam-right">Камера ▶</button>
        </div>
        
        <div id="height-controls">
            <button class="height-btn" data-action="up">⬆️ Вверх</button>
            <button class="height-btn" data-action="down">⬇️ Вниз</button>
        </div>
        
        <div id="message-popup"></div>
        <div id="crosshair"></div>
    </div>

    <script type="importmap">
        {"imports": {"three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"}}
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // Звук
        let audioContext = null;
        let soundEnabled = true;
        
        function initAudio() {
            if(audioContext) return;
            try { audioContext = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
        }
        
        function playSound(type) {
            if(!soundEnabled || !audioContext) return;
            if(audioContext.state === 'suspended') audioContext.resume();
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain); gain.connect(audioContext.destination);
            
            switch(type) {
                case 'shoot': osc.type='sawtooth'; osc.frequency.value=180; gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.15); osc.start(); osc.stop(now+0.15); break;
                case 'bullet_fly': osc.type='sine'; osc.frequency.value=800; osc.frequency.exponentialRampToValueAtTime(400,now+0.12); gain.gain.setValueAtTime(0.06,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.12); osc.start(); osc.stop(now+0.12); break;
                case 'poop': osc.type='triangle'; osc.frequency.value=120; gain.gain.setValueAtTime(0.08,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.1); osc.start(); osc.stop(now+0.1); break;
                case 'anger': osc.type='square'; osc.frequency.value=200; gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.2); osc.start(); osc.stop(now+0.2); break;
            }
        }
        
        window.toggleSound = function() {
            soundEnabled = !soundEnabled;
            document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊 Звук' : '🔇 Звук';
            if(soundEnabled && !audioContext) initAudio();
        };
        
        document.addEventListener('click', () => { if(!audioContext) initAudio(); }, {once: true});
        document.addEventListener('touchstart', () => { if(!audioContext) initAudio(); }, {once: true});

        // Игра
        let controlMode = 'pc';
        let gameStarted = false;
        
        document.querySelectorAll('[data-control]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-control]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                controlMode = btn.dataset.control;
                document.getElementById('pc-controls').style.display = controlMode === 'pc' ? 'grid' : 'none';
                document.getElementById('mobile-controls-info').style.display = controlMode === 'mobile' ? 'grid' : 'none';
            });
        });
        
        // Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7a9ab5);
        scene.fog = new THREE.FogExp2(0x7a9ab5, 0.0015);
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 18, 30);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const cssRenderer = new CSS2DRenderer();
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
        cssRenderer.domElement.style.position = 'absolute';
        cssRenderer.domElement.style.top = '0'; cssRenderer.domElement.style.left = '0';
        cssRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(cssRenderer.domElement);

        // Освещение
        scene.add(new THREE.AmbientLight(0x556677, 0.6));
        const sun = new THREE.DirectionalLight(0xeeddcc, 1.2);
        sun.position.set(60, 100, 40);
        sun.castShadow = true; sun.receiveShadow = true;
        sun.shadow.mapSize.width = 1024; sun.shadow.mapSize.height = 1024;
        const d = 200;
        sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
        sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
        sun.shadow.camera.near = 1; sun.shadow.camera.far = 350;
        scene.add(sun);

        // Земля
        const mapSize = 250;
        const boundary = mapSize - 10;
        
        const ground = new THREE.Mesh(new THREE.CircleGeometry(mapSize, 64), new THREE.MeshStandardMaterial({color: 0x6a8a5e}));
        ground.rotation.x = -Math.PI/2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);
        
        const grid = new THREE.GridHelper(mapSize*2, 30, 0x557755, 0x446644);
        grid.position.y = 0.01;
        scene.add(grid);
        
        // Забор
        const postMat = new THREE.MeshStandardMaterial({color: 0x7a6a5a});
        for(let i=0; i<50; i++) {
            const a = (i/50)*Math.PI*2;
            const post = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.6,2.2), postMat);
            post.position.set(Math.cos(a)*boundary, 1.1, Math.sin(a)*boundary);
            post.receiveShadow = true; post.castShadow = true;
            scene.add(post);
        }
        
        // Река
        const river = new THREE.Mesh(new THREE.PlaneGeometry(12, 280), new THREE.MeshStandardMaterial({color: 0x4a7a9a, transparent: true}));
        river.rotation.x = -Math.PI/2;
        river.position.y = 0.02;
        river.position.z = 15;
        scene.add(river);
        
        // Дома
        function makeHouse(x, z, c) {
            const g = new THREE.Group();
            const w = new THREE.Mesh(new THREE.BoxGeometry(3.8,2.8,3.8), new THREE.MeshStandardMaterial({color: [0xb0a090,0xa09080,0x9a8a7a][c%3]}));
            w.position.y = 1.4; w.castShadow = true; w.receiveShadow = true; g.add(w);
            const roof = new THREE.Mesh(new THREE.ConeGeometry(3.0,1.6,4), new THREE.MeshStandardMaterial({color: 0x7a5a4a}));
            roof.position.y = 3.0; roof.rotation.y = Math.PI/4; roof.castShadow = true; g.add(roof);
            g.position.set(x, 0, z);
            return g;
        }
        for(let i=0; i<15; i++) {
            let x,z;
            do { const a=Math.random()*Math.PI*2, r=50+Math.random()*160; x=Math.cos(a)*r; z=Math.sin(a)*r; } while(Math.abs(x)<18 && z>-25 && z<70);
            scene.add(makeHouse(x,z,i));
        }
        
        // Деревья
        function tree(x,z) {
            const g = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.8,2.8), new THREE.MeshStandardMaterial({color: 0x6a5a4a}));
            trunk.position.y=1.4; trunk.castShadow=true; trunk.receiveShadow=true; g.add(trunk);
            const foliage = new THREE.Mesh(new THREE.ConeGeometry(2.0,2.8,6), new THREE.MeshStandardMaterial({color:0x4a7a4a}));
            foliage.position.y=3.5; foliage.castShadow=true; g.add(foliage);
            g.position.set(x,0,z); return g;
        }
        for(let i=0; i<40; i++) {
            const a=Math.random()*Math.PI*2, r=60+Math.random()*150;
            const x=Math.cos(a)*r, z=Math.sin(a)*r;
            if(Math.abs(x)<18 && z>-25 && z<80) continue;
            scene.add(tree(x,z));
        }

        // Птица
        const bird = new THREE.Group();
        bird.add(new THREE.Mesh(new THREE.SphereGeometry(0.85), new THREE.MeshStandardMaterial({color:0xcc9944})));
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({color:0xccaa55}));
        head.position.set(0,0.65,0.75); bird.add(head);
        bird.add(new THREE.Mesh(new THREE.ConeGeometry(0.18,0.45), new THREE.MeshStandardMaterial({color:0xcc7733}))).position.set(0,0.6,1.15);
        const leftWing = new THREE.Mesh(new THREE.BoxGeometry(0.85,0.1,0.55), new THREE.MeshStandardMaterial({color:0xaa8844}));
        leftWing.position.set(-0.9,0.3,0); leftWing.rotation.z=-0.4; leftWing.castShadow=true; bird.add(leftWing);
        const rightWing = new THREE.Mesh(new THREE.BoxGeometry(0.85,0.1,0.55), new THREE.MeshStandardMaterial({color:0xaa8844}));
        rightWing.position.set(0.9,0.3,0); rightWing.rotation.z=0.4; rightWing.castShadow=true; bird.add(rightWing);
        bird.position.set(0, 12, 25);
        bird.castShadow = true;
        scene.add(bird);

        // Системы
        let globalAnger = 0;
        const maxAnger = 100;
        const entities = [];
        const hunters = [];
        const bullets = [];
        const droppings = [];
        let poopCooldown = 0;
        let caged = false;
        let cageEndTime = 0;
        const cageGroup = new THREE.Group();
        
        function updateAngerUI() {
            const p = (globalAnger/maxAnger)*100;
            document.getElementById('anger-fill').style.width = p+'%';
            document.getElementById('anger-value').textContent = Math.round(p)+'%';
            const hunterStatus = document.getElementById('hunter-status');
            if(globalAnger >= 10) {
                hunterStatus.innerHTML = '🏹 Охотники: 🔴';
                hunterStatus.style.color = '#ff8888';
            } else {
                hunterStatus.innerHTML = '🏹 Охотники: 🟢';
                hunterStatus.style.color = '#ccaa88';
            }
        }
        
        function createPerson(x, z, type='villager') {
            const g = new THREE.Group();
            const skin = type==='hunter' ? 0x6a7a8a : 0xccaa99;
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.45,1.7), new THREE.MeshStandardMaterial({color:skin}));
            body.position.y=0.85; body.castShadow=true; body.receiveShadow=true; g.add(body);
            const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.32), new THREE.MeshStandardMaterial({color:skin}));
            headMesh.position.y=1.8; headMesh.castShadow=true; g.add(headMesh);
            
            const div = document.createElement('div');
            div.style.cssText = 'color:#ddc;font-size:11px;font-weight:bold;background:rgba(30,20,20,0.6);padding:2px 5px;border-radius:8px;';
            div.textContent = type==='hunter'?'Охотник':'Житель';
            const label = new CSS2DObject(div);
            label.position.set(0,2.5,0);
            g.add(label);
            
            if(type==='hunter') {
                g.add(new THREE.Mesh(new THREE.ConeGeometry(0.45,0.45), new THREE.MeshStandardMaterial({color:0x4a3a2a}))).position.y=2.1;
                const gun = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,1.0), new THREE.MeshStandardMaterial({color:0x444}));
                gun.position.set(0.45,1.1,0.35); gun.rotation.z=0.3; g.add(gun);
            }
            g.position.set(x,0,z);
            g.userData = {type, anger:0, labelDiv:div, speed:type==='hunter'?0.022:0.018, target:null, lastShot:0};
            return g;
        }
        
        for(let i=0; i<10; i++) {
            let x,z;
            do { const a=Math.random()*Math.PI*2, r=45+Math.random()*170; x=Math.cos(a)*r; z=Math.sin(a)*r; } while(Math.abs(x)<20 && z>-30 && z<80);
            scene.add(createPerson(x,z,'villager')); entities.push(scene.children[scene.children.length-1]);
        }
        
        function spawnHunter(x,z) {
            const h = createPerson(x,z,'hunter');
            scene.add(h); entities.push(h); hunters.push(h);
            document.getElementById('hunter-count').textContent = hunters.length;
        }
        spawnHunter(-40,-30);
        spawnHunter(45,20);
        
        // Клетка
        (function(){
            const m = new THREE.MeshStandardMaterial({color:0x9a9a9a});
            for(let i=0;i<4;i++){ const b=new THREE.Mesh(new THREE.BoxGeometry(0.2,2.8,0.2),m); b.position.set(i%2?-1.5:1.5,1.4,i<2?-1.5:1.5); b.castShadow=true; cageGroup.add(b); }
            cageGroup.visible=false;
            scene.add(cageGroup);
        })();
        
        function captureBird() {
            if(caged) return;
            caged = true;
            cageEndTime = performance.now() + 10000;
            cageGroup.position.copy(bird.position);
            cageGroup.position.y = 0.5;
            cageGroup.visible = true;
            document.getElementById('cage-timer').style.display = 'block';
            document.getElementById('cage-alert').innerHTML = '🔒';
        }
        
        function dropPoop() {
            if(caged || !gameStarted || poopCooldown > 0) return;
            poopCooldown = 1.0;
            playSound('poop');
            
            const poop = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({color:0x7a6a5a}));
            poop.position.copy(bird.position); poop.position.y -= 0.7;
            poop.userData = {velocity: new THREE.Vector3(0, 0.02, 0)};
            poop.castShadow = true;
            scene.add(poop); droppings.push(poop);
            
            entities.forEach(e => {
                if(e.userData.type !== 'animal' && poop.position.distanceTo(e.position) < 4.5) {
                    e.userData.anger = Math.min(100, e.userData.anger + 25);
                    globalAnger = Math.min(maxAnger, globalAnger + 8);
                    updateAngerUI();
                    e.userData.labelDiv.textContent = '😠';
                    e.userData.target = bird.position.clone();
                    showMessage('💩 Попадание!');
                    playSound('anger');
                }
            });
        }
        
        function showMessage(t) {
            const el = document.getElementById('message-popup');
            el.style.opacity = 1; el.textContent = t;
            setTimeout(() => el.style.opacity = 0, 1500);
        }
        
        // Управление
        const keys = { w:false, q:false, e:false, space:false, shift:false, up:false, down:false, camLeft:false, camRight:false };
        let mouseX = 0, mouseY = 0.3;
        let touchStartX = 0, touchStartY = 0;
        
        // Мобильные кнопки
        document.querySelectorAll('.mobile-btn, .height-btn, .camera-btn').forEach(btn => {
            const action = btn.dataset.action;
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(action, true); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); handleAction(action, false); });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); handleAction(action, true); });
            btn.addEventListener('mouseup', (e) => { e.preventDefault(); handleAction(action, false); });
        });
        
        function handleAction(action, state) {
            if(!gameStarted) return;
            switch(action) {
                case 'forward': keys.w = state; break;
                case 'up': keys.up = state; break;
                case 'down': keys.down = state; break;
                case 'cam-left': keys.camLeft = state; break;
                case 'cam-right': keys.camRight = state; break;
                case 'poop': if(state) dropPoop(); break;
            }
        }
        
        // Сенсорный обзор
        renderer.domElement.addEventListener('touchstart', (e) => {
            if(!gameStarted) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        renderer.domElement.addEventListener('touchmove', (e) => {
            if(!gameStarted) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            mouseX += dx * 0.005;
            mouseY = Math.max(-0.5, Math.min(1.0, mouseY + dy * 0.005));
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        window.addEventListener('keydown', e => {
            if(!gameStarted || controlMode !== 'pc') return;
            switch(e.code) {
                case 'KeyW': keys.w=true; break;
                case 'KeyQ': keys.q=true; break;
                case 'KeyE': keys.e=true; break;
                case 'Space': keys.space=true; break;
                case 'ShiftLeft': case 'ShiftRight': keys.shift=true; break;
                case 'KeyF': dropPoop(); break;
            }
            e.preventDefault();
        });
        window.addEventListener('keyup', e => {
            if(controlMode !== 'pc') return;
            switch(e.code) {
                case 'KeyW': keys.w=false; break;
                case 'KeyQ': keys.q=false; break;
                case 'KeyE': keys.e=false; break;
                case 'Space': keys.space=false; break;
                case 'ShiftLeft': case 'ShiftRight': keys.shift=false; break;
            }
        });
        
        document.addEventListener('mousemove', e => {
            if(!gameStarted || controlMode !== 'pc' || !document.pointerLockElement) return;
            mouseX += e.movementX*0.002;
            mouseY = Math.max(-0.5, Math.min(1.0, mouseY + e.movementY*0.002));
        });
        
        renderer.domElement.addEventListener('click', () => { if(gameStarted && controlMode === 'pc') renderer.domElement.requestPointerLock(); });
        
        document.getElementById('start-game-btn').addEventListener('click', () => {
            document.getElementById('start-menu').style.display = 'none';
            gameStarted = true;
            bird.position.set(0, 12, 25);
            if(controlMode === 'mobile') {
                document.getElementById('mobile-controls').classList.add('active');
                document.getElementById('height-controls').classList.add('active');
                document.getElementById('camera-controls').classList.add('active');
            } else {
                renderer.domElement.requestPointerLock();
            }
            showMessage('🦅 Взлетаем!');
            initAudio();
        });
        
        // Анимация
        let wingFlap = 0, lastTime = performance.now();
        const camDir = new THREE.Vector3();
        
        function animate(time) {
            requestAnimationFrame(animate);
            const delta = Math.min(0.1, (time - lastTime)/1000);
            lastTime = time;
            
            if(!gameStarted) {
                bird.position.y = 12 + Math.sin(time*0.003)*1.5;
                wingFlap += 0.2;
                leftWing.rotation.z = -0.4 + Math.sin(wingFlap)*0.3;
                rightWing.rotation.z = 0.4 - Math.sin(wingFlap)*0.3;
                camera.position.x = 30*Math.sin(time*0.0008);
                camera.position.z = 30*Math.cos(time*0.0008);
                camera.position.y = 18;
                camera.lookAt(bird.position);
                renderer.render(scene, camera);
                cssRenderer.render(scene, camera);
                return;
            }
            
            if(poopCooldown > 0) {
                poopCooldown = Math.max(0, poopCooldown - delta);
                document.getElementById('poop-cooldown-text').textContent = poopCooldown>0 ? `💩 ${poopCooldown.toFixed(1)}с` : '💩 Готов';
            }
            
            if(caged) {
                const remaining = Math.max(0, cageEndTime - performance.now());
                document.getElementById('cage-timer').textContent = Math.ceil(remaining/1000);
                if(performance.now() > cageEndTime) {
                    caged = false; cageGroup.visible = false;
                    document.getElementById('cage-timer').style.display = 'none';
                    document.getElementById('cage-alert').innerHTML = '✅';
                } else {
                    bird.position.copy(cageGroup.position).add(new THREE.Vector3(0,1.5,0));
                }
            }
            
            if(!caged) {
                camera.getWorldDirection(camDir);
                camDir.y = 0; camDir.normalize();
                
                // Поворот камеры кнопками (для телефона)
                if(keys.camLeft) mouseX -= 0.025;
                if(keys.camRight) mouseX += 0.025;
                
                if(controlMode === 'mobile') {
                    if(keys.w) { bird.position.x += camDir.x*0.4; bird.position.z += camDir.z*0.4; }
                    if(keys.up) bird.position.y += 0.25;
                    if(keys.down) bird.position.y -= 0.25;
                } else {
                    if(keys.w) { bird.position.x += camDir.x*0.5; bird.position.z += camDir.z*0.5; }
                    if(keys.q) mouseX -= 0.025;
                    if(keys.e) mouseX += 0.025;
                    if(keys.space) bird.position.y += 0.3;
                    if(keys.shift) bird.position.y -= 0.3;
                }
                
                bird.position.y = Math.max(4, Math.min(40, bird.position.y));
                ['x','z'].forEach(ax => { if(Math.abs(bird.position[ax]) > boundary-6) bird.position[ax] = Math.sign(bird.position[ax])*(boundary-6); });
                
                // Камера следит за птицей
                const offset = new THREE.Vector3(-9, 5, 12);
                offset.applyEuler(new THREE.Euler(mouseY, mouseX, 0, 'YXZ'));
                camera.position.copy(bird.position).add(offset);
                camera.lookAt(bird.position.clone().add(new THREE.Vector3(0, 2, 0)));
                
                // Птица всегда смотрит вперёд по камере
                bird.rotation.y = mouseX;
            }
            
            wingFlap += 0.25;
            const flap = Math.sin(wingFlap)*0.45;
            leftWing.rotation.z = -0.4 + flap*0.4;
            rightWing.rotation.z = 0.4 - flap*0.4;
            
            globalAnger = Math.max(0, globalAnger - delta*0.5);
            updateAngerUI();
            
            // Пули
            bullets.forEach((b,i) => {
                b.position.add(b.userData.velocity.clone().multiplyScalar(delta*60));
                b.userData.velocity.y -= delta*6;
                
                if(!b.userData.soundPlayed && b.position.distanceTo(bird.position) < 15) {
                    b.userData.soundPlayed = true;
                    playSound('bullet_fly');
                }
                
                if(b.material) {
                    b.material.emissiveIntensity = 0.6 + Math.sin(time*0.03)*0.4;
                }
                
                if(b.position.y < 0.5 || b.position.distanceTo(bird.position) < 4.5) {
                    if(b.position.distanceTo(bird.position) < 4.5 && !caged) {
                        captureBird();
                        showMessage('💥 Попадание!');
                    }
                    scene.remove(b); bullets.splice(i,1);
                }
            });
            
            droppings.forEach((d,i) => {
                d.position.y += d.userData.velocity.y*delta*60;
                d.userData.velocity.y -= delta*10;
                if(d.position.y < 0.3) { scene.remove(d); droppings.splice(i,1); }
            });
            
            // NPC
            entities.forEach(e => {
                if(!e.parent) return;
                const d = e.userData;
                d.anger = Math.max(0, d.anger - delta*2);
                if(d.anger > 20) d.labelDiv.textContent = '😠';
                else d.labelDiv.textContent = d.type==='hunter'?'Охотник':'Житель';
                
                if(d.type !== 'animal' && (d.anger > 15 || globalAnger > 10)) {
                    d.target = bird.position.clone();
                }
                
                if(d.target) {
                    const dir = new THREE.Vector3().subVectors(d.target, e.position);
                    if(dir.length() < 3.0) {
                        if(d.type==='hunter' && !caged && globalAnger >= 10) captureBird();
                        d.target = null;
                    } else {
                        dir.normalize();
                        e.position.x += dir.x * d.speed * delta * 60;
                        e.position.z += dir.z * d.speed * delta * 60;
                    }
                } else if(Math.random() < delta * 0.3) {
                    d.target = new THREE.Vector3(e.position.x+(Math.random()-0.5)*12, 0, e.position.z+(Math.random()-0.5)*12);
                }
                
                if(d.type === 'hunter' && !caged && globalAnger >= 10) {
                    const dist = e.position.distanceTo(bird.position);
                    if(dist < 35 && performance.now() - d.lastShot > 2000) {
                        d.lastShot = performance.now();
                        playSound('shoot');
                        
                        const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.45), 
                            new THREE.MeshStandardMaterial({color: 0xffaa00, emissive: 0xff4400, emissiveIntensity: 1.2}));
                        bullet.position.copy(e.position).add(new THREE.Vector3(0,1.5,0));
                        
                        const dir = new THREE.Vector3().subVectors(bird.position, e.position).normalize();
                        bullet.userData = {velocity: dir.multiplyScalar(0.6), soundPlayed: false};
                        bullet.castShadow = true;
                        scene.add(bullet);
                        bullets.push(bullet);
                        showMessage('🔫 Выстрел!');
                    }
                }
            });
            
            renderer.render(scene, camera);
            cssRenderer.render(scene, camera);
        }
        
        requestAnimationFrame(animate);
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
