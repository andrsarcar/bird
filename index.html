<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>🐦 Птица в деревне</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-color: #5a7a9a;
            touch-action: none;
        }
        
        #start-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(3px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; color: #e0e8f0; pointer-events: auto;
        }
        .menu-content {
            background: rgba(30,40,50,0.95); padding: 20px 25px; border-radius: 30px;
            max-width: 750px; width: 90%; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7); border: 1px solid #6a8aaa;
            position: relative;
        }
        .menu-content h1 { color: #ffcc88; font-size: 28px; margin-bottom: 5px; }
        
        .coins-display {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #333; padding: 10px 20px; border-radius: 30px;
            font-size: 22px; font-weight: bold; margin: 10px 0;
            display: inline-block;
        }
        
        .control-selector { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
        .control-btn {
            background: #2a3a4a; color: #ccddee; border: 2px solid #4a6a8a;
            padding: 8px 12px; border-radius: 12px; cursor: pointer;
            font-size: 13px; font-weight: bold; flex: 1;
        }
        .control-btn.active { background: #4a8a6a; border-color: #8accaa; color: white; }
        
        .skins-title {
            color: #ffcc88; font-size: 16px; margin: 15px 0 10px;
            border-bottom: 1px solid #6a8aaa; padding-bottom: 5px;
        }
        .skins-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            margin: 10px 0; padding: 5px;
        }
        .skin-card {
            background: rgba(20,30,40,0.8); border: 2px solid #4a6a8a;
            border-radius: 12px; padding: 8px 4px; cursor: pointer;
            transition: all 0.2s; text-align: center;
        }
        .skin-card.locked { opacity: 0.5; filter: grayscale(0.7); }
        .skin-card.active {
            border-color: #ffcc88; background: rgba(60,80,100,0.9);
            box-shadow: 0 0 15px #ffcc88;
        }
        .skin-emoji { font-size: 28px; margin-bottom: 3px; }
        .skin-name { color: #ffd966; font-size: 11px; font-weight: bold; }
        .skin-stats { color: #aaccdd; font-size: 9px; margin-top: 3px; }
        .skin-price { color: #ffd700; font-size: 10px; margin-top: 2px; }
        .skin-ability { color: #88ccff; font-size: 9px; margin-top: 2px; }
        
        .upgrade-section {
            margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 15px;
        }
        .upgrade-btn {
            background: #3a5a6a; color: white; border: none; padding: 8px 15px;
            border-radius: 20px; cursor: pointer; font-size: 12px; margin: 5px;
        }
        
        .start-btn {
            background: #5a8a6a; color: white; border: none; padding: 12px 25px;
            font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer;
            margin-top: 15px; border-bottom: 5px solid #3a6a4a; width: 100%;
        }

        .promo-section {
            margin: 15px 0; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 15px;
            border: 1px solid #6a8aaa;
        }
        .promo-title {
            color: #ffcc88; font-size: 14px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .promo-input-group { display: flex; gap: 8px; }
        .promo-input {
            flex: 1; padding: 10px; border-radius: 10px; border: none;
            background: rgba(20,30,40,0.9); color: #ffd966; font-size: 14px;
            border: 1px solid #6a8aaa;
        }
        .promo-input::placeholder { color: #8899aa; }
        .promo-btn {
            background: #4a6a8a; color: white; border: none; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; font-weight: bold;
        }

        .crown-icon {
            position: absolute; top: 10px; right: 10px;
            font-size: 24px; cursor: pointer; opacity: 0.3;
            transition: opacity 0.2s; z-index: 10;
        }
        .crown-icon:hover { opacity: 1; }
        .admin-console {
            margin-top: 15px; padding: 15px; background: rgba(40,20,30,0.9);
            border-radius: 15px; border: 1px solid #aa6688; display: none;
        }
        .admin-console.active { display: block; }
        .admin-title { color: #ffaacc; font-size: 14px; margin-bottom: 10px; }
        .admin-input {
            width: 100%; padding: 8px; margin: 5px 0; border-radius: 8px;
            background: rgba(20,10,15,0.9); color: #ffccaa; border: 1px solid #aa6688;
        }
        .admin-btn {
            background: #884466; color: white; border: none; padding: 6px 15px;
            border-radius: 8px; cursor: pointer; margin: 5px 5px 0 0;
        }
        .promo-list {
            max-height: 150px; overflow-y: auto; margin: 10px 0;
            color: #ccaa99; font-size: 12px;
        }

        .password-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; border-radius: 30px;
        }
        .password-box {
            background: rgba(40,30,40,0.95); padding: 25px; border-radius: 20px;
            text-align: center; border: 2px solid #aa6688; max-width: 300px; width: 90%;
        }
        .password-box h3 { color: #ffaacc; margin-bottom: 15px; }
        .password-input {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: rgba(20,10,15,0.9); color: #ffccaa; font-size: 16px;
            border: 1px solid #aa6688; margin-bottom: 15px; text-align: center;
            -webkit-text-security: disc;
        }
        .password-input:focus { outline: 2px solid #cc88aa; }
        .password-buttons { display: flex; gap: 10px; justify-content: center; }
        .password-btn {
            background: #884466; color: white; border: none; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; font-weight: bold; flex: 1;
        }
        .password-btn.cancel { background: #555566; }
        
        #game-ui { opacity: 1; pointer-events: none; }
        #ui-top {
            position: absolute; top: 10px; left: 10px;
            background: rgba(20,25,35,0.85); color: #ffcc88; padding: 6px 14px;
            border-radius: 30px; backdrop-filter: blur(4px); z-index: 100;
            border-left: 4px solid #aa8844; font-size: 14px;
        }
        #game-coins {
            position: absolute; top: 50px; left: 10px;
            background: rgba(20,25,35,0.85); color: #ffd700; padding: 6px 14px;
            border-radius: 30px; backdrop-filter: blur(4px); z-index: 100;
            font-size: 14px; font-weight: bold;
        }
        #time-indicator {
            position: absolute; top: 90px; left: 10px;
            background: rgba(20,25,35,0.85); color: #aaccdd; padding: 6px 14px;
            border-radius: 30px; backdrop-filter: blur(4px); z-index: 100;
            font-size: 14px;
        }
        #status-bar {
            position: absolute; top: 10px; right: 10px;
            background: rgba(20,25,35,0.85); color: #ccddee; padding: 6px 12px;
            border-radius: 30px; backdrop-filter: blur(4px); z-index: 100;
            font-size: 12px; display: flex; gap: 10px; border: 1px solid #4a6a8a;
        }
        .anger-bar { width: 60px; height: 6px; background: #2a3a4a; border-radius: 4px; overflow: hidden; }
        .anger-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #cc6644, #cc9933); }
        #cage-timer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30,20,20,0.9); color: #ffaa88; padding: 12px 25px;
            border-radius: 20px; font-size: 40px; font-weight: bold;
            border: 2px solid #aa5544; z-index: 300; display: none;
        }
        #cooldown-indicator {
            position: absolute; bottom: 180px; left: 10px;
            background: rgba(20,25,35,0.8); color: #aaccdd; padding: 5px 12px;
            border-radius: 20px; font-size: 12px;
        }
        #ability-indicator {
            position: absolute; bottom: 180px; right: 10px;
            background: rgba(20,25,35,0.8); color: #88ccff; padding: 5px 12px;
            border-radius: 20px; font-size: 12px;
        }
        
        #mobile-controls {
            position: absolute; bottom: 15px; left: 0; right: 0;
            display: none; justify-content: center; gap: 8px; padding: 5px;
            z-index: 200; pointer-events: none;
        }
        #mobile-controls.active { display: flex; flex-wrap: wrap; }
        .mobile-btn {
            background: rgba(30,40,55,0.9); color: #ffd966; border: 2px solid #5a7a9a;
            border-radius: 15px; padding: 10px 14px; font-size: 16px; font-weight: bold;
            pointer-events: auto; cursor: pointer; min-width: 55px; text-align: center;
        }
        .mobile-btn.special { background: rgba(80,60,100,0.9); color: #cc88ff; border-color: #aa88cc; }
        
        #camera-controls {
            position: absolute; left: 10px; bottom: 180px;
            display: none; gap: 8px; z-index: 200; pointer-events: none;
        }
        #camera-controls.active { display: flex; }
        .camera-btn {
            background: rgba(30,40,55,0.9); color: #88aacc; border: 2px solid #4a6a8a;
            border-radius: 15px; padding: 10px 14px; font-size: 18px; font-weight: bold;
            pointer-events: auto; cursor: pointer; text-align: center;
        }
        
        #height-controls {
            position: absolute; right: 10px; bottom: 240px;
            display: none; flex-direction: column; gap: 8px; z-index: 200; pointer-events: none;
        }
        #height-controls.active { display: flex; }
        .height-btn {
            background: rgba(30,40,55,0.9); color: #aaccdd; border: 2px solid #5a7a9a;
            border-radius: 15px; padding: 10px 14px; font-size: 16px; font-weight: bold;
            pointer-events: auto; cursor: pointer; text-align: center;
        }
        
        #exit-btn {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(80,40,40,0.8); color: #ffaaaa; padding: 5px 15px;
            border-radius: 20px; font-size: 12px; cursor: pointer;
            pointer-events: auto; z-index: 500; border: 1px solid #aa5555;
            display: none;
        }
        #exit-btn.active { display: block; }
        
        #message-popup {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            color: #ddccaa; background: rgba(25,20,15,0.85); padding: 6px 15px;
            border-radius: 25px; font-size: 14px; font-weight: bold;
            opacity: 0; transition: opacity 0.2s; z-index: 150;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            border-radius: 50%; background: rgba(220,220,240,0.7);
            transform: translate(-50%, -50%); z-index: 200;
        }
        #hunter-status {
            position: absolute; bottom: 100px; right: 10px;
            background: rgba(20,25,35,0.8); color: #ccaa88; padding: 5px 12px;
            border-radius: 20px; font-size: 11px;
        }
        
        .health-bar {
            position: absolute;
            width: 40px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            transform: translate(-50%, -50%);
        }
        .health-fill { height: 100%; background: #ff4444; transition: width 0.2s; }
    </style>
</head>
<body>
    <div id="start-menu">
        <div class="menu-content">
            <div class="crown-icon" id="crown-icon">👑</div>
            <h1>🐦 Птица в деревне</h1>
            <div class="coins-display" id="menu-coins">🪙 500 монет</div>
            
            <div class="promo-section">
                <div class="promo-title">🎁 Промокод</div>
                <div class="promo-input-group">
                    <input type="text" class="promo-input" id="promo-input" placeholder="Введите код" autocomplete="off" autocapitalize="characters">
                    <button class="promo-btn" id="promo-activate">Активировать</button>
                </div>
            </div>
            
            <div class="control-selector">
                <button class="control-btn active" data-control="pc">💻 ПК</button>
                <button class="control-btn" data-control="mobile">📱 Телефон</button>
            </div>
            
            <div class="skins-title">🎨 Образы (5 легендарных по 1000🪙)</div>
            <div class="skins-grid" id="skins-container"></div>
            
            <div class="upgrade-section">
                <strong style="color:#ffcc88;">⬆️ Прокачка</strong><br>
                <button class="upgrade-btn" id="upgrade-speed">⚡ Скорость (50🪙)</button>
                <button class="upgrade-btn" id="upgrade-agility">🌀 Ловкость (50🪙)</button>
                <button class="upgrade-btn" id="upgrade-ability">✨ Суперспособность (100🪙)</button>
            </div>
            
            <div class="admin-console" id="admin-console">
                <div class="admin-title">🔐 Админ-консоль</div>
                <input type="text" class="admin-input" id="admin-command" placeholder="promoadd КОД МОНЕТЫ" autocomplete="off">
                <div style="display:flex; gap:5px;">
                    <button class="admin-btn" id="admin-execute">Выполнить</button>
                    <button class="admin-btn" id="admin-list">Список</button>
                    <button class="admin-btn" id="admin-close">Закрыть</button>
                </div>
                <div class="promo-list" id="promo-list"></div>
            </div>
            
            <div class="password-modal" id="password-modal" style="display: none;">
                <div class="password-box">
                    <h3>👑 Введите пароль</h3>
                    <input type="text" class="password-input" id="password-input" placeholder="••••••••" autocomplete="off" name="fake-password">
                    <div class="password-buttons">
                        <button class="password-btn" id="password-submit">Войти</button>
                        <button class="password-btn cancel" id="password-cancel">Отмена</button>
                    </div>
                </div>
            </div>
            
            <button class="start-btn" id="start-game-btn">НАЧАТЬ ПОЛЁТ</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="ui-top">🐦 <span id="bird-name">Воробей</span></div>
        <div id="game-coins">🪙 <span id="game-coins-value">500</span></div>
        <div id="time-indicator">🌞 День</div>
        <div id="status-bar">
            <span>🏹 <span id="hunter-count">2</span></span>
            <div style="display:flex; align-items:center; gap:4px;">
                <span>😠</span>
                <div class="anger-bar"><div id="anger-fill" class="anger-fill"></div></div>
                <span id="anger-value">0%</span>
            </div>
            <span id="cage-alert">✅</span>
        </div>
        <div id="cage-timer">10</div>
        <div id="cooldown-indicator"><span id="poop-cooldown-text">💩 Готов</span></div>
        <div id="ability-indicator"><span id="ability-status">✨ Готов</span></div>
        <div id="hunter-status">🏹 Охотники: 🟢</div>
        <div id="exit-btn">🚪 ВЫХОД (L)</div>
        
        <div id="mobile-controls">
            <button class="mobile-btn" data-action="forward">↑</button>
            <button class="mobile-btn" data-action="poop">💩</button>
            <button class="mobile-btn special" data-action="ability">✨</button>
            <button class="mobile-btn" data-action="exit" style="background:#884444; color:#ffaaaa;">🚪</button>
        </div>
        
        <div id="camera-controls">
            <button class="camera-btn" data-action="cam-left">◀</button>
            <button class="camera-btn" data-action="cam-right">▶</button>
        </div>
        
        <div id="height-controls">
            <button class="height-btn" data-action="up">⬆️</button>
            <button class="height-btn" data-action="down">⬇️</button>
        </div>
        
        <div id="message-popup"></div>
        <div id="crosshair"></div>
    </div>

    <script type="importmap">
        {"imports": {"three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"}}
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const SAVE_KEY = 'birdVillageSave';
        const PROMO_STORAGE_KEY = 'birdPromoCodes';
        const ADMIN_PASSWORD = 'bird14lollolandr';
        
        let promoCodes = {};
        
        function loadPromoCodes() {
            const saved = localStorage.getItem(PROMO_STORAGE_KEY);
            if (saved) promoCodes = JSON.parse(saved);
            else promoCodes = {};
        }
        function savePromoCodes() { localStorage.setItem(PROMO_STORAGE_KEY, JSON.stringify(promoCodes)); }
        loadPromoCodes();
        
        let gameData = { coins: 500, unlockedSkins: [0], skins: [], usedPromos: [] };
        
        const baseSkins = [
            { name: 'Воробей', emoji: '🐦', color: 0xcc9944, size: 0.8, speed: 1.2, agility: 1.3, price: 0, ability: 'Ускорение' },
            { name: 'Орёл', emoji: '🦅', color: 0x8B4513, size: 1.2, speed: 0.9, agility: 0.7, price: 100, ability: 'Крик' },
            { name: 'Голубь', emoji: '🕊️', color: 0xaaaaaa, size: 0.85, speed: 1.0, agility: 1.0, price: 50, ability: 'Мир' },
            { name: 'Ворон', emoji: '🐦‍⬛', color: 0x222222, size: 0.9, speed: 1.1, agility: 1.2, price: 150, ability: 'Тень' },
            { name: 'Попугай', emoji: '🦜', color: 0xff4444, size: 0.85, speed: 1.15, agility: 1.4, price: 120, ability: 'Копия' },
            { name: 'Сова', emoji: '🦉', color: 0x8B7355, size: 0.95, speed: 0.8, agility: 0.9, price: 80, ability: 'Ночное зрение' },
            { name: 'Фламинго', emoji: '🦩', color: 0xff69b4, size: 1.1, speed: 0.85, agility: 0.6, price: 90, ability: 'Грация' },
            { name: 'Колибри', emoji: '🐦', color: 0x00ff88, size: 0.6, speed: 1.5, agility: 2.0, price: 200, ability: 'Телепорт' },
            { name: 'Пингвин', emoji: '🐧', color: 0x334455, size: 0.9, speed: 0.7, agility: 0.5, price: 70, ability: 'Скольжение' },
            { name: 'Феникс', emoji: '🔥', color: 0xff6600, size: 1.0, speed: 1.3, agility: 1.1, price: 300, ability: 'Возрождение' },
            { name: 'Дракон', emoji: '🐉', color: 0x44aa44, size: 1.4, speed: 1.0, agility: 0.8, price: 1000, ability: 'Огненное дыхание' },
            { name: 'Птеродактиль', emoji: '🦇', color: 0x664422, size: 1.5, speed: 1.2, agility: 0.6, price: 1000, ability: 'Крик ужаса' },
            { name: 'Ангел', emoji: '👼', color: 0xffdd88, size: 1.0, speed: 1.1, agility: 1.3, price: 1000, ability: 'Исцеление' },
            { name: 'Демон', emoji: '👿', color: 0x882222, size: 1.1, speed: 1.4, agility: 1.2, price: 1000, ability: 'Проклятие' },
            { name: 'Кибер-птица', emoji: '🤖', color: 0x4488cc, size: 1.0, speed: 1.6, agility: 1.5, price: 1000, ability: 'ЭМИ' }
        ];
        
        function loadGame() {
            const saved = localStorage.getItem(SAVE_KEY);
            if (saved) {
                gameData = JSON.parse(saved);
                if (!gameData.usedPromos) gameData.usedPromos = [];
                gameData.skins.forEach((s, i) => { if (baseSkins[i]) { baseSkins[i].speed = s.speed; baseSkins[i].agility = s.agility; baseSkins[i].abilityLevel = s.abilityLevel || 1; } });
            } else {
                gameData.skins = baseSkins.map(s => ({ speed: s.speed, agility: s.agility, abilityLevel: 1 }));
                gameData.unlockedSkins = [0];
                gameData.usedPromos = [];
            }
            updateCoinsDisplay();
        }
        function saveGame() {
            gameData.skins = baseSkins.map(s => ({ speed: s.speed, agility: s.agility, abilityLevel: s.abilityLevel || 1 }));
            localStorage.setItem(SAVE_KEY, JSON.stringify(gameData));
        }
        function updateCoinsDisplay() {
            document.getElementById('menu-coins').textContent = `🪙 ${gameData.coins} монет`;
            if (document.getElementById('game-coins-value')) document.getElementById('game-coins-value').textContent = gameData.coins;
        }
        loadGame();
        
        function activatePromoCode(code) {
            if (!code) return showMessage('❌ Введите промокод');
            const upperCode = code.toUpperCase();
            if (gameData.usedPromos.includes(upperCode)) return showMessage('⚠️ Промокод уже использован');
            const promo = promoCodes[upperCode];
            if (!promo) return showMessage('❌ Неверный промокод');
            if (promo.coins) { gameData.coins += promo.coins; showMessage(`🎉 +${promo.coins} монет!`); }
            if (promo.skin !== undefined && !gameData.unlockedSkins.includes(promo.skin)) { gameData.unlockedSkins.push(promo.skin); showMessage(`🦜 Открыт новый образ!`); }
            gameData.usedPromos.push(upperCode);
            saveGame(); updateCoinsDisplay(); renderSkinGrid();
        }
        
        function adminAddPromo(code, coins) {
            if (!code || !coins) return '❌ Формат: promoadd КОД МОНЕТЫ';
            const upperCode = code.toUpperCase();
            promoCodes[upperCode] = { coins: parseInt(coins) };
            savePromoCodes();
            return `✅ Промокод ${upperCode} добавлен (${coins}🪙)`;
        }
        function adminRemovePromo(code) {
            if (!code) return '❌ Формат: promoremove КОД';
            const upperCode = code.toUpperCase();
            if (promoCodes[upperCode]) { delete promoCodes[upperCode]; savePromoCodes(); return `✅ Промокод ${upperCode} удалён`; }
            return `❌ Промокод ${upperCode} не найден`;
        }
        function adminListPromos() {
            const codes = Object.entries(promoCodes);
            if (codes.length === 0) return '📋 Нет активных промокодов';

        renderer.domElement.addEventListener('click', () => { if(gameStarted && controlMode === 'pc') renderer.domElement.requestPointerLock(); });
        document.getElementById('start-game-btn').addEventListener('click', () => { document.getElementById('start-menu').style.display = 'none'; gameStarted = true; updatePreviewBird(); bird.position.set(0, 12, 25); document.getElementById('exit-btn').classList.add('active'); if(controlMode === 'mobile') { document.getElementById('mobile-controls').classList.add('active'); document.getElementById('height-controls').classList.add('active'); document.getElementById('camera-controls').classList.add('active'); } else renderer.domElement.requestPointerLock(); showMessage('🦅 Взлетаем!'); initAudio(); });
        
        let wingFlap = 0, lastTime = performance.now(); const camDir = new THREE.Vector3();
        function animate(time) { requestAnimationFrame(animate); const delta = Math.min(0.1, (time - lastTime)/1000); lastTime = time;
            dayTime = (Math.sin(time * 0.0001) + 1) * 0.5; const dayFactor = dayTime; const nightFactor = 1 - dayTime;
            const isOwl = baseSkins[selectedSkinIndex].name === 'Сова'; const brightness = (nightVisionActive && isOwl) ? 1.0 : (0.3 + dayFactor * 0.4);
            scene.background.setHSL(0.58, 0.5, 0.2 + brightness * 0.4); scene.fog.color.copy(scene.background);
            ambientLight.intensity = (nightVisionActive && isOwl) ? 0.8 : (0.3 + dayFactor * 0.4); sunLight.intensity = dayFactor * 1.5; sunLight.color.setHSL(0.1, 0.8, 0.5 + dayFactor * 0.3); moonLight.intensity = (nightVisionActive && isOwl) ? 0.2 : (nightFactor * 0.5);
            const timeEl = document.getElementById('time-indicator'); if (dayFactor > 0.7) timeEl.innerHTML = '🌞 День'; else if (dayFactor > 0.3) timeEl.innerHTML = '🌅 Рассвет/Закат'; else timeEl.innerHTML = '🌙 Ночь'; if (nightVisionActive && isOwl) timeEl.innerHTML += ' 🦉';
            if(!gameStarted) { bird.position.y = 12 + Math.sin(time*0.003)*1.5; wingFlap += 0.2; leftWing.rotation.z = -0.4 + Math.sin(wingFlap)*0.3; rightWing.rotation.z = 0.4 - Math.sin(wingFlap)*0.3; camera.position.x = 30*Math.sin(time*0.0008); camera.position.z = 30*Math.cos(time*0.0008); camera.position.y = 18; camera.lookAt(bird.position); renderer.render(scene, camera); cssRenderer.render(scene, camera); return; }
            if(poopCooldown > 0) { poopCooldown = Math.max(0, poopCooldown - delta); } if(abilityCooldown > 0) { abilityCooldown = Math.max(0, abilityCooldown - delta); } document.getElementById('ability-status').textContent = abilityCooldown>0 ? `✨ ${abilityCooldown.toFixed(1)}с` : '✨ Готов';
            if(caged) { const remaining = Math.max(0, cageEndTime - performance.now()); document.getElementById('cage-timer').textContent = Math.ceil(remaining/1000); if(performance.now() > cageEndTime) { caged = false; cageGroup.visible = false; document.getElementById('cage-timer').style.display = 'none'; document.getElementById('cage-alert').innerHTML = '✅'; } else bird.position.copy(cageGroup.position).add(new THREE.Vector3(0,1.5,0)); }
            if(!caged) { camera.getWorldDirection(camDir); camDir.y = 0; camDir.normalize(); if(keys.camLeft) mouseX -= 0.025; if(keys.camRight) mouseX += 0.025; const skin = baseSkins[selectedSkinIndex], spd = skin.speed, agi = skin.agility; if(controlMode === 'mobile') { if(keys.w) { bird.position.x += camDir.x*0.4*spd; bird.position.z += camDir.z*0.4*spd; } if(keys.up) bird.position.y += 0.25*agi; if(keys.down) bird.position.y -= 0.25*agi; } else { if(keys.w) { bird.position.x += camDir.x*0.5*spd; bird.position.z += camDir.z*0.5*spd; } if(keys.q) mouseX -= 0.025*agi; if(keys.e) mouseX += 0.025*agi; if(keys.space) bird.position.y += 0.3*agi; if(keys.shift) bird.position.y -= 0.3*agi; } bird.position.y = Math.max(4, Math.min(40, bird.position.y)); ['x','z'].forEach(ax => { if(Math.abs(bird.position[ax]) > boundary-6) bird.position[ax] = Math.sign(bird.position[ax])*(boundary-6); }); const offset = new THREE.Vector3(-9, 5, 12); offset.applyEuler(new THREE.Euler(mouseY, mouseX, 0, 'YXZ')); camera.position.copy(bird.position).add(offset); camera.lookAt(bird.position.clone().add(new THREE.Vector3(0, 2, 0))); bird.rotation.y = mouseX; }
            wingFlap += 0.25; leftWing.rotation.z = -0.4 + Math.sin(wingFlap)*0.4; rightWing.rotation.z = 0.4 - Math.sin(wingFlap)*0.4;
            globalAnger = Math.max(0, globalAnger - delta*0.5); updateAngerUI();
            bullets.forEach((b,i) => { b.position.add(b.userData.velocity.clone().multiplyScalar(delta*60)); b.userData.velocity.y -= delta * 2; const age = performance.now() - (b.userData.birthTime || 0); if (!b.userData.birthTime) b.userData.birthTime = performance.now(); if (b.position.y < 0.5 || age > 10000) { scene.remove(b); bullets.splice(i,1); } else if (b.position.distanceTo(bird.position) < 4.5 && !caged) { captureBird(); scene.remove(b); bullets.splice(i,1); } });
            droppings.forEach((d,i) => { d.position.y += d.userData.velocity.y * delta * 60; d.userData.velocity.y -= delta * 8; entities.forEach(e => { if(e.userData.type !== 'animal' && d.position.distanceTo(e.position) < 3.5) { const damage = d.userData.demonic ? 2 : 1; e.userData.health -= damage; const healthPercent = (e.userData.health / e.userData.maxHealth) * 100; if (e.userData.healthBar) e.userData.healthBar.fill.style.width = healthPercent + '%'; e.userData.anger = Math.min(100, e.userData.anger + (d.userData.demonic ? 40 : 25)); globalAnger = Math.min(maxAnger, globalAnger + (d.userData.demonic ? 15 : 8)); updateAngerUI(); e.userData.labelDiv.textContent = '😠'; e.userData.target = bird.position.clone(); gameData.coins += d.userData.demonic ? 10 : 5; updateCoinsDisplay(); playSound('coin'); showMessage(`💩 ${d.userData.demonic ? '💀 ДЕМОНИЧЕСКИЙ' : ''} -${damage} HP! +${d.userData.demonic ? 10 : 5}🪙`); if (e.userData.health <= 0) respawnPerson(e); scene.remove(d); droppings.splice(i,1); } }); if(d.position.y < 0.3 || performance.now() - d.userData.birthTime > d.userData.lifetime) { scene.remove(d); droppings.splice(i,1); } });
            entities.forEach(e => { if(!e.parent) return; const d = e.userData; d.anger = Math.max(0, d.anger - delta*2); if(d.anger > 20) d.labelDiv.textContent = '😠'; else d.labelDiv.textContent = d.type==='hunter'?'Охотник':'Житель'; if(d.type !== 'animal' && (d.anger > 15 || globalAnger > 10)) d.target = bird.position.clone(); if(d.target) { const dir = new THREE.Vector3().subVectors(d.target, e.position); if(dir.length() < 3.0) { if(d.type==='hunter' && !caged && globalAnger >= 10) captureBird(); d.target = null; } else { dir.normalize(); e.position.x += dir.x * d.speed * delta * 60; e.position.z += dir.z * d.speed * delta * 60; } } else if(Math.random() < delta * 0.3) d.target = new THREE.Vector3(e.position.x+(Math.random()-0.5)*12, 0, e.position.z+(Math.random()-0.5)*12); if(d.type === 'hunter' && !caged && globalAnger >= 10) { if(e.position.distanceTo(bird.position) < 210 && performance.now() - d.lastShot > 15000) { d.lastShot = performance.now(); playSound('shoot'); const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({color:0xffaa00, emissive:0xff4400, emissiveIntensity:1.2})); bullet.position.copy(e.position).add(new THREE.Vector3(0,1.5,0)); bullet.userData = {velocity: new THREE.Vector3().subVectors(bird.position, e.position).normalize().multiplyScalar(0.8), birthTime: performance.now()}; bullet.castShadow = true; scene.add(bullet); bullets.push(bullet); showMessage('🔫 Выстрел!'); } } });
            renderer.render(scene, camera); cssRenderer.render(scene, camera);
        }
        requestAnimationFrame(animate);
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); cssRenderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
